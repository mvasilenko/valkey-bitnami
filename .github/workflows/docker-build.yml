name: Build and push Valkey images

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  VALKEY_IMAGE: ghcr.io/mvasilenko/valkey
  SENTINEL_IMAGE: ghcr.io/mvasilenko/valkey-sentinel

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag and build args
        id: vars
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "build_args=VALKEY_VERSION=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "build_args=" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push valkey
        uses: docker/build-push-action@v6
        with:
          context: docker/valkey
          push: true
          tags: ${{ env.VALKEY_IMAGE }}:${{ steps.vars.outputs.tag }}
          build-args: ${{ steps.vars.outputs.build_args }}
          platforms: linux/amd64,linux/arm64

      - name: Build and push valkey-sentinel
        uses: docker/build-push-action@v6
        with:
          context: docker/valkey-sentinel
          push: true
          tags: ${{ env.SENTINEL_IMAGE }}:${{ steps.vars.outputs.tag }}
          build-args: ${{ steps.vars.outputs.build_args }}
          platforms: linux/amd64,linux/arm64
